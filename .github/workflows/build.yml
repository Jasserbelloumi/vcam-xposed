name: Build VCAM APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platforms
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-33" "build-tools;33.0.0" "platform-tools"

      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://raw.githubusercontent.com/gradle/gradle/v7.5.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --no-daemon 2>&1 | tee /tmp/build.log
          if grep -q "error:" /tmp/build.log; then
            echo "======= COMPILER ERRORS ======="
            grep "error:" /tmp/build.log
            exit 1
          fi

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: vcam-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: vcam-release
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: "VCAM v${{ github.run_number }}"
          body: |
            ## VCAM - Virtual Camera

            ضع صورة في `/sdcard/DCIM/Camera1/` وفعّل الوحدة من LSPosed/Xposed.

            | الملف | التأثير |
            |-------|---------|
            | flip_h.cfg | قلب أفقي |
            | flip_v.cfg | قلب عمودي |
            | rotate_90.cfg | تدوير 90° |
            | rotate_180.cfg | تدوير 180° |
            | rotate_270.cfg | تدوير 270° |
            | move_left.cfg | تحريك يسار |
            | move_right.cfg | تحريك يمين |
            | move_up.cfg | تحريك أعلى |
            | move_down.cfg | تحريك أسفل |
            | disable.jpg | تعطيل VCAM |
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
